<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <h1>MiniTab Pro</h1>
      <p>Statistical Analytics Platform</p>
    </div>

    <nav class="nav-list">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: link.path === '/dashboard' }"
      >
        {{ link.label }}
      </a>
    </nav>
  </aside>

  <section class="content">
    <header class="topbar">
      <div>
        <h2>Analytics Workspace</h2>
        <p>Frontend Angular 17 listo para FastAPI</p>
      </div>
    </header>

    <main class="page-container">
      <router-outlet />
    </main>
  </section>
</div>
